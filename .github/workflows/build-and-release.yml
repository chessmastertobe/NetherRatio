name: Build and Release

on:
  push:
    tags:
      - 'v*'           # Release on tags
    branches:
      - folia-portal-v2   # Build on your development branch
  workflow_dispatch:   # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload Artifact (Development Build)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: NetherRatio-Development
          path: target/NetherRatio-*.jar
          retention-days: 7

  release:
    needs: build
    if: github.ref_type == 'tag'   # Only run on tags
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install git-cliff
        run: |
          curl -sL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-2.7.0/git-cliff /usr/local/bin/
          rm -rf git-cliff-2.7.0

      - name: Generate release notes
        run: |
          /usr/local/bin/git-cliff --tag v${{ steps.version.outputs.VERSION }} --unreleased --strip all > RELEASE_NOTES.md

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/NetherRatio-*.jar
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

      - name: Publish to Hangar
        env:
          HANGAR_API_KEY: ${{ secrets.HANGAR_TOKEN }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          # (Your existing Hangar upload logic stays here)

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: target/Nether
