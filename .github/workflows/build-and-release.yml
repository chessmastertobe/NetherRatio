name: Build NetherRatio

on:
  workflow_dispatch:
  push:
    branches: [ folia-fixes ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (with debug)
        run: mvn -B clean package --file pom.xml -e -X | tail -n 100

      - name: Upload JAR (if successful)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NetherRatio-Folia-Fixed
          path: target/*.jar
